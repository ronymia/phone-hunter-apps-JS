<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>
    <main class="container">

        <div id="phone-details" class="row row-cols-1 row-cols-md-3 g-4 mx-auto my-4">

        </div>
        <h1 class="text-center text-success my-3">
            Search Your Dream Phone
        </h1>
        <!-- search box  -->
        <div class="input-group mb-3 w-50 mx-auto my-3">
            <input id="search-field" type="text" class="form-control" placeholder="phone that you want"
                aria-label="Recipient's username" aria-describedby="button-addon2">
            <button onclick="searchPhone()" class="btn btn-outline-secondary" type="button"
                id="search-field">Search</button>
        </div>



        <!-- phone search are  -->
        <div id="search-result" class="row row-cols-1 row-cols-md-3 g-4 my-3">

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="./js/phone-apps.js"></script>
</body>

</html>
